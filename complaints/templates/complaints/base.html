<!DOCTYPE html>
<html>
<head>
    <title>VIT Complaint Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="{% url 'dashboard' %}">
            VIT Complaint Management
        </a>

        {% if user.is_authenticated %}
        <div>
            <a class="btn btn-light btn-sm" href="{% url 'dashboard' %}">Dashboard</a>
            <a class="btn btn-light btn-sm" href="{% url 'lodge_complaint' %}">Lodge Complaint</a>
            <a class="btn btn-light btn-sm" href="{% url 'active_complaints' %}">Active</a>
            <a class="btn btn-light btn-sm" href="{% url 'previous_complaints' %}">Previous</a>
            <form method="post" action="{% url 'logout' %}" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger btn-sm">
                    Logout
                </button>
            </form>
        </div>
        {% endif %}
    </div>
</nav>

<div class="container mt-4">

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-info">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
